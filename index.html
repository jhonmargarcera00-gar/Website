<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jhon Mar Garcera - Homepage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :focus {
            outline: 3px solid #8b5cf6;
            outline-offset: 4px;
        }
        .glass {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans">

    <!-- Sticky Navigation -->
    <header class="fixed top-0 w-full z-40 glass">
        <nav class="container mx-auto px-6 py-4 flex justify-between items-center" aria-label="Primary">
            <span class="text-xl font-bold tracking-tight text-violet-400">JhonMar Website</span>
            <ul class="hidden md:flex space-x-8 text-sm font-medium uppercase tracking-widest">
               
                <li id="nav-login"><a href="login.html" class="hover:text-violet-400 transition-colors">Login</a></li>
                <li id="nav-register"><a href="register.html" class="hover:text-violet-400 transition-colors">Register</a></li>
            </ul>
        </nav>
    </header>

    <main class="min-h-screen flex items-center justify-center pt-20 px-6">
        <div class="text-center space-y-6 max-w-4xl">
            <h1 class="text-5xl md:text-7xl font-extrabold tracking-tighter">
                Welcome to <span class="text-transparent bg-clip-text bg-gradient-to-r from-violet-400 to-fuchsia-500">JhonMar.dev</span>
            </h1>
            <p class="text-slate-400 text-lg md:text-xl max-w-2xl mx-auto leading-relaxed">
                Explore my portfolio, login to access exclusive content, or register to join the community.
            </p>
            <div class="flex flex-col md:flex-row gap-4 justify-center pt-6">
               
                <a id="btn-login" href="login.html" class="border border-slate-700 px-8 py-4 rounded-xl font-bold hover:bg-slate-900 transition-all">Login</a>
                <a id="btn-register" href="register.html" class="border border-slate-700 px-8 py-4 rounded-xl font-bold hover:bg-slate-900 transition-all">Register</a>
            </div>
        </div>
    </main>

    <script>
        if (localStorage.getItem('loggedIn') === 'true') {
            document.getElementById('nav-login').style.display = 'none';
            document.getElementById('nav-register').style.display = 'none';
            document.getElementById('btn-login').style.display = 'none';
            document.getElementById('btn-register').style.display = 'none';
        }
    </script>

</body>
</html>
